<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Mon Agent LLM</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="bg-grid"></div>
  <div class="glow-orb orb-1"></div>
  <div class="glow-orb orb-2"></div>

  <div class="chat-wrapper">
    <header class="chat-header">
      <div class="header-icon">
        <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <circle cx="12" cy="12" r="3" fill="currentColor"/>
          <path d="M12 2v3M12 19v3M2 12h3M19 12h3M4.93 4.93l2.12 2.12M16.95 16.95l2.12 2.12M4.93 19.07l2.12-2.12M16.95 7.05l2.12-2.12" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
        </svg>
      </div>
      <div class="header-text">
        <h1>Mon Agent <span class="accent">LLM</span></h1>
        <p class="status"><span class="pulse-dot"></span>En ligne · Prêt à répondre</p>
      </div>
    </header>

    <div class="chat-messages" id="chatMessages">
      <div class="message-row bot-row intro-message">
        <div class="avatar bot-avatar">
          <svg viewBox="0 0 24 24" fill="none"><circle cx="12" cy="8" r="4" stroke="currentColor" stroke-width="1.5"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
        </div>
        <div class="message bot-message">
          <span class="message-label">Agent LLM</span>
          Bonjour ! Je suis votre assistant IA. Comment puis-je vous aider aujourd'hui ?
        </div>
      </div>
    </div>

    <div class="chat-input-area">
      <div class="input-container">
        <textarea id="userInput" placeholder="Posez votre question ici..." rows="1"></textarea>
        <button id="sendBtn" class="send-btn" onclick="sendMessage()">
          <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M5 12H19M19 12L13 6M19 12L13 18" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </button>
      </div>
      <p class="input-hint">Appuyez sur <kbd>Enter</kbd> pour envoyer · <kbd>Shift+Enter</kbd> pour un saut de ligne</p>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
